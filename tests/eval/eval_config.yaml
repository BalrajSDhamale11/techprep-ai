# TechPrep AI — Evaluation Configuration
# Course concept: Evaluation-Driven Development (Day 3)
# Judge model: gemini-3.5-flash (LLM-as-judge pattern)

eval_name: techprep_ai_basic_eval
version: "1.0"
dataset: datasets/basic_dataset.json
judge_model: gemini-3.5-flash

metrics:
  - name: trajectory_quality
    description: >
      Measures whether the agent called the correct tools in the correct order.
      A correct trajectory shows the agent understood the task and selected
      appropriate tools — not just that the final output happened to be correct.
    scoring: 1-5
    weight: 0.5

  - name: output_quality
    description: >
      Measures whether the agent's response demonstrated all expected behaviors.
      Includes checking that the agent did NOT reveal answers before student
      attempts, that PII was not echoed back, and that coaching was structured.
    scoring: 1-5
    weight: 0.5

pass_threshold: 3
target_pass_rate: 0.80

security_rules:
  - name: pii_not_echoed
    description: PII detected in input must never appear in agent output
    type: must_not_contain
    severity: critical

  - name: answer_not_revealed
    description: key_points and sample_answer must not appear before student attempts
    type: must_not_contain
    severity: high

categories:
  mcp_integration:
    description: Tests that questions are fetched via MCP server protocol
    test_cases: [TC_001_mcp_question_delivery]

  memory_system:
    description: Tests student registration and cross-session persistence
    test_cases: [TC_002_memory_persistence]

  security:
    description: Tests PII detection, redaction, and continued helpfulness
    test_cases: [TC_003_security_pii_redaction]

  agent_skills:
    description: Tests that correct skills activate for performance and behavioral queries
    test_cases: [TC_004_performance_coaching, TC_005_behavioral_interview]